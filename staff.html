<!DOCTYPE html>
<html>
<head>
  <title>Staff Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="dashboard">
    <div class="main">
      <nav>
        <a href="#dashboard">Home</a>
        <a href="#">Resources</a>
      </nav>

      <header id="home"> 
        <h1>CrisisSync</h1>
        <h3>Emergency Response System</h3>
      </header>
    </div>
  </div>

  <h3>Dashboard</h3>

  <input type="text" id="search" placeholder="Search..."> 

  <div class="filter">
    <h3>Filter By:</h3>
    <select id="filter">
      <option value="">All</option>
      <option value="Recent">Recent</option>
      <option value="Resolved">Resolved</option>
      <option value="Fire">Fire</option>
      <option value="Medical">Medical</option>
      <option value="Disaster">Natural Disaster</option>
      <option value="Police">Police Complaint</option>
    </select>
  </div>

  <table id="EmergencyTable" border="1">
    <thead>
      <tr>
        <th>Date</th>
        <th>Time</th>
        <th>Type</th>
        <th>Location</th>
        <th>Description</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <!-- ✅ IMPORTANT: tbody with id -->
    <tbody id="tableBody">
    </tbody>
  </table>

  <!-- ✅ CONNECT JS FILE -->
  <script src="staff.js"></script>
</body>
</html>
