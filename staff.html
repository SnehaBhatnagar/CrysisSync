<!DOCTYPE html>
<html>

<head>
  <title>Staff Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="dashboard">
    <div class="main">
      <nav>
        <a href="#dashboard">Home</a>
        <a href="resources.html">Resources</a>
      </nav>
      <header id="home">
        <h1>CrisisSync</h1>
        <h3>Emergency Response System</h3>
      </header>
    </div>
  </div>
  <h3>Dashboard</h3>
  <table id="EmergencyTable" border="1">
    <thead>
      <tr>
        <th>Date</th>
        <th>Time</th>
        <th>Type</th>
        <th>Location</th>
        <th>Description</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
  </table>
  <div id="resourceModal" class="modal-overlay">
    <div class="modal-content">
      <h2>Dispatch Resource</h2>
      <p>Select the nearest facility:</p>

      <select id="resourceSelect" class="modal-select"></select>

      <div class="modal-btn-group">
        <button onclick="confirmDispatch()" class="btn-confirm">Confirm</button>
        <button onclick="closeModal()" class="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>
  <script src="staff.js"></script>
</body>

</html>
